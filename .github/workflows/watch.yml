name: watch

on:
  schedule:
    - cron: "3-59/5 * * * *" # offset from :00 — GitHub delays runs most at the top of the hour
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun watch.ts
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
